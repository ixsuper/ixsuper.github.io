<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found · Ziyad Alsuhaymi</title>
    <meta name="description" content="This page drifted off the map. Head back home to explore iOS apps by Ziyad Alsuhaymi.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#070a1a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f6ff" media="(prefers-color-scheme: light)">
    <meta name="color-scheme" content="dark light">

    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-0: #05070f;
            --text: #e8ecf4;
            --text-muted: rgba(255, 255, 255, 0.55);
            --border: rgba(255, 255, 255, 0.1);
            --border-hi: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-0);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated liquid background */
        .bg-stage {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(120% 80% at 50% 0%, #0b1136 0%, #05070f 60%);
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
        }
        .orb-1 {
            width: 560px; height: 560px;
            background: radial-gradient(circle, rgba(64, 112, 255, 0.8), transparent 65%);
            top: -160px; left: -120px;
            animation: drift1 22s ease-in-out infinite;
        }
        .orb-2 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(255, 95, 186, 0.65), transparent 65%);
            bottom: -140px; right: -120px;
            animation: drift2 26s ease-in-out infinite;
        }
        .orb-3 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(80, 220, 255, 0.55), transparent 65%);
            top: 40%; left: 45%;
            animation: drift3 30s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 60px) scale(1.08); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-90px, -40px) scale(1.1); }
        }
        @keyframes drift3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-60%, -40%) scale(1.12); }
        }

        .card {
            position: relative;
            max-width: 560px;
            width: 100%;
            padding: 56px 48px;
            background: rgba(12, 16, 38, 0.55);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--border);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .code {
            font-size: 7em;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #4f80ff 0%, #ff5fba 55%, #50dcff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05em;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1em;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f80ff, #7b5cff);
            color: #fff;
            box-shadow: 0 10px 30px rgba(79, 128, 255, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(79, 128, 255, 0.55);
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border-hi);
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .apps {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }
        .apps h2 {
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .apps-list {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .apps-list a {
            color: #7eb4ff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
        }
        .apps-list a:hover { color: #fff; text-decoration: underline; }

        @media (prefers-reduced-motion: reduce) {
            .orb { animation: none; }
        }

        @media (max-width: 500px) {
            .card { padding: 40px 28px; }
            .code { font-size: 5em; }
            h1 { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="bg-stage" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="card">
        <div class="code">404</div>
        <h1>Lost in the drift</h1>
        <p>This page isn&rsquo;t where we left it. It may have been moved, renamed, or never existed in the first place.</p>

        <div class="actions">
            <a href="/" class="btn btn-primary">&larr; Back to Home</a>
            <a href="mailto:alsuhaymiziyad@gmail.com" class="btn btn-ghost">Report a broken link</a>
        </div>

        <div class="apps">
            <h2>Try one of these instead</h2>
            <div class="apps-list">
                <a href="/echoes/">&#x1F30D; Echoes</a>
                <a href="/block-blaster/">&#x1F9E9; Block Blaster Puzzle</a>
                <a href="/colornumbermatch/">&#x1F522; Color Number Match</a>
            </div>
        </div>
    </main>
</body>
</html>
